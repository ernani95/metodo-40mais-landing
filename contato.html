<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato | Método 40+</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --cor-primaria: #7C2D8F;
      --cor-secundaria: #D4617A;
      --cor-bg: #111119;
      --cor-texto: rgba(255, 255, 255, 0.85);
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--cor-bg);
      color: var(--cor-texto);
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--cor-secundaria);
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 40px;
    }
    a {
      color: var(--cor-secundaria);
      text-decoration: none;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 30px;
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      transition: background 0.3s;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.1);
      text-decoration: none;
    }
    .contact-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px;
      margin-top: 20px;
    }
    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background-color: #25D366;
      color: #fff;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 16px 32px;
      border-radius: 100px;
      transition: transform 0.3s, filter 0.3s;
      margin-top: 10px;
    }
    .whatsapp-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
      text-decoration: none;
    }
    .whatsapp-btn i {
      font-size: 1.4rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn">← Voltar para a página inicial</a>
    
    <h1>Fale Conosco</h1>
    
    <div class="contact-card">
      <p>Nossa equipe de suporte está sempre pronta para ajudar você na sua jornada de transformação.</p>
      
      <p style="font-size: 0.9rem; color: rgba(255,255,255,0.6);">Precisa de ajuda com seu acesso ou tem dúvidas sobre o Método? Chame no WhatsApp:</p>
      
      <a href="https://wa.me/5511961850780?text=Ol%C3%A1%21+Preciso+de+ajuda+com+o+M%C3%A9todo+40%2B." class="whatsapp-btn" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-whatsapp"></i>
        +55 11 96185-0780
      </a>
      
      <p style="margin-top: 30px; font-size: 0.85rem; color: rgba(255,255,255,0.5);">
        Horário de atendimento: Segunda a Sexta, das 09h às 18h.
      </p>
    </div>
  </div>
</body>
</html>
